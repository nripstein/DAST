on:
  push:

name: R-CMD-check

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}
    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: ubuntu-latest,  r: 'release'}
          - {os: macos-latest,   r: 'release'}
          - {os: windows-latest, r: 'release'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          use-public-rspm: true

      # - name: Set GDAL and PROJ paths
      # run: |
      #   echo "PROJ_LIB=$(projinfo --config | grep PROJ_LIB | cut -d '=' -f2)" >> $GITHUB_ENV
      #   echo "GDAL_DATA=$(gdal-config --datadir)" >> $GITHUB_ENV

      # - name: Run R CMD check
      # run: |
      #   export PROJ_LIB=${{ env.PROJ_LIB }}
      #   export GDAL_DATA=${{ env.GDAL_DATA }}
      #   R CMD check .

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - name: Configure PROJ data path
        shell: Rscript {0}
        run: |
          proj_dirs <- c(
            system.file("proj", package = "terra"),
            system.file("proj", package = "sf")
          )
          proj_dirs <- proj_dirs[file.exists(file.path(proj_dirs, "proj.db"))]
          if (!length(proj_dirs)) {
            stop("Could not find proj.db in the installed terra or sf packages.")
          }
          cat("Using PROJ data path:", proj_dirs[[1]], "\n")
          cat("PROJ_DATA=", proj_dirs[[1]], "\n", sep = "", file = Sys.getenv("GITHUB_ENV"), append = TRUE)
          cat("PROJ_LIB=", proj_dirs[[1]], "\n", sep = "", file = Sys.getenv("GITHUB_ENV"), append = TRUE)

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          build_args: 'c("--no-manual","--compact-vignettes=gs+qpdf")'
